.scr-out{opacity:0;transform:scale(1.05);pointer-events:none;transition:opacity .6s,transform .6s}

.btn:hover{transform:scale(1.05)}

.btn-p{background:linear-gradient(135deg,#FF4D6D,#7B2CBF)}

.btn-p:hover::before{opacity:.6}
.btn-s{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(8px)}
.tg{background:linear-gradient(135deg,#FF4D6D,#FF758F,#FFB3C1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tc{text-align:center}
.hi{display:inline-block}

@keyframes fi{from{opacity:0}to{opacity:1}}

@keyframes fs{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}

.made{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:50;font-size:.75rem;color:rgba(255,255,255,.15);font-family:monospace}

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Открой, только если любишь меня ❤️</title>
<meta name="description" content="Создано с любовью. Открой, чтобы узнать правду.">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
body{background:#0a0a0f;color:#fff;font-family:'Inter',sans-serif;overflow:hidden;min-height:100dvh}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.8}
.aurora{position:absolute;pointer-events:none;border-radius:50%;filter:blur(80px)}
.aurora-1{width:100%;height:100%;top:-50%;left:-50%;background:radial-gradient(circle,rgba(255,77,109,.1),transparent 70%);animation:auroraAnim 8s ease-in-out infinite}
.aurora-2{width:100%;height:100%;bottom:-50%;right:-50%;background:radial-gradient(circle,rgba(123,44,191,.1),transparent 70%);animation:auroraAnim 8s ease-in-out infinite 2s}
.aurora-3{width:75%;height:50%;top:33%;left:12.5%;background:radial-gradient(circle,rgba(255,117,143,.05),transparent 70%);animation:auroraAnim 8s ease-in-out infinite 4s}
@keyframes auroraAnim{
  0%{transform:translate(0,0)scale(1);opacity:.3}
  25%{transform:translate(10%,-10%)scale(1.1);opacity:.4}
  50%{transform:translate(-5%,5%)scale(.9);opacity:.3}
  75%{transform:translate(5%,-5%)scale(1.05);opacity:.35}
  100%{transform:translate(0,0)scale(1);opacity:.3}
}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity .6s,transform .6s}
.screen-exit{opacity:0;transform:scale(1.05);pointer-events:none}
.screen-enter{opacity:1;transform:scale(1)}
.screen-hidden{opacity:0;transform:scale(.95);pointer-events:none}
.btn{position:relative;padding:16px 40px;font-size:1.125rem;font-weight:600;border-radius:9999px;border:none;color:#fff;cursor:pointer;overflow:hidden;transition:transform .2s;font-family:'Inter',sans-serif}
.btn:hover{transform:scale(1.05)}
.btn:active{transform:scale(.95)}
.btn-primary{background:linear-gradient(135deg,#FF4D6D,#7B2CBF)}
.btn-primary::before{content:'';position:absolute;inset:-4px;background:linear-gradient(135deg,#FF4D6D,#7B2CBF);border-radius:9999px;filter:blur(8px);opacity:.4;transition:opacity .2s}
.btn-primary:hover::before{opacity:.6}
.btn-secondary{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(8px)}
.text-gradient{background:linear-gradient(135deg,#FF4D6D,#FF758F,#FFB3C1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.text-center{text-align:center}
.heart{display:inline-block}
.heart-pulse{animation:pulseHeart 2.5s ease-in-out infinite}
@keyframes pulseHeart{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.08)}
}
@keyframes pulseGlow{
  0%,100%{box-shadow:0 0 20px rgba(255,77,109,.3),0 0 60px rgba(255,77,109,.1)}
  50%{box-shadow:0 0 40px rgba(255,77,109,.5),0 0 80px rgba(255,77,109,.2)}
}
.glow{padding:20px;border-radius:50%;animation:pulseGlow 3s ease-in-out infinite;display:inline-flex}
.fadeIn{animation:fadeIn .8s ease forwards}
.fadeInUp{animation:fadeInUp .8s ease forwards}
.fadeInScale{animation:fadeInScale .6s ease forwards}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInScale{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
@keyframes typewriter{from{width:0}to{width:100%}}
.typewriter{display:inline;overflow:hidden;white-space:nowrap;border-right:2px solid #FF4D6D;animation:blink .8s step-end infinite}
@keyframes blink{50%{border-color:transparent}}
.fadeOut{animation:fadeOut .5s ease forwards}
@keyframes fadeOut{to{opacity:0}}
.made{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:50;font-size:.75rem;color:rgba(255,255,255,.15);font-family:monospace;opacity:0;animation:fadeIn 1s ease 2s forwards}
.flying-hearts{position:absolute;inset:0;pointer-events:none;overflow:hidden}
@keyframes floatUp{
  0%{transform:translateY(0)translateX(0)scale(0);opacity:0}
  20%{opacity:1}
  80%{opacity:1}
  100%{transform:translateY(-120vh)translateX(var(--x))scale(.5);opacity:0}
}
.float-heart{position:absolute;animation:floatUp var(--dur) ease-in-out var(--delay) infinite;bottom:-40px}
.shake{animation:shake .5s ease}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-5px)rotate(-3deg)}
  75%{transform:translateX(5px)rotate(3deg)}
}
.fullscreen{position:fixed;inset:0;overflow:hidden}
.page{width:100%;height:100dvh;position:relative;overflow:hidden}
</style>
</head>

<div id="root"></div>
<div class="made">made with ❤️</div>

  return React.createElement("svg", {

// Particle Field
function ParticleField() {
  const canvasRef = useRef(null);
  const mouseRef = useRef({ x: -1000, y: -1000 });
  const particlesRef = useRef([]);
  const frameRef = useRef(0);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    if (!ctx) return;

    const init = () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const count = Math.min(Math.floor((canvas.width * canvas.height) / 12000), 80);
      const p = [];
      for (let i = 0; i < count; i++) {
        p.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,

    init();
    window.addEventListener("resize", init);
    window.addEventListener("mousemove", (e) => {
      mouseRef.current = { x: e.clientX, y: e.clientY };
    });

    const animate = () => {
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      const particles = particlesRef.current;
      const mx = mouseRef.current.x;
      const my = mouseRef.current.y;

      for (const p of particles) {
        const dx = mx - p.x;
        const dy = my - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          const force = (150 - dist) / 150;
          p.vx -= (dx / dist) * force * 0.02;
          p.vy -= (dy / dist) * force * 0.02;
        }
        p.vx += (Math.random() - 0.5) * 0.02;
        p.vy += (Math.random() - 0.5) * 0.02;
        p.vx *= 0.99;
        p.vy *= 0.99;
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0) p.x = w;
        if (p.x > w) p.x = 0;
        if (p.y < 0) p.y = h;
        if (p.y > h) p.y = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.hue},80%,65%,${p.opacity})`;
        ctx.fill();

      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {

          const dy = particles[i].y - particles[j].y;

          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(255,77,109,${0.08 * (1 - dist / 120)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      frameRef.current = requestAnimationFrame(animate);
    };
    frameRef.current = requestAnimationFrame(animate);
    return () => {
      cancelAnimationFrame(frameRef.current);
      window.removeEventListener("resize", init);
    };
  }, []);

  return React.createElement("canvas", { ref: canvasRef });
}

// Screen 1
function Screen1({ onContinue, visible }) {
  const [show, setShow] = useState(false);

}

// Screen 2
function Screen2({ onContinue, visible }) {
  const [showText, setShowText] = useState(false);
  const [showBtns, setShowBtns] = useState(false);
  const [typed, setTyped] = useState("");
  const noBtnRef = useRef(null);
  const fullText = "Ты уверен(а)?";

  useEffect(() => {
    if (!visible) return;
    const t1 = setTimeout(() => setShowText(true), 300);
    const t2 = setTimeout(() => setShowBtns(true), 2200);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, [visible]);

  useEffect(() => {
    if (!showText) return;
    let i = 0;
    const iv = setInterval(() => { setTyped(fullText.slice(0, i + 1)); i++; if (i >= fullText.length) clearInterval(iv); }, 80);
    return () => clearInterval(iv);
  }, [showText]);

  const moveNo = useCallback(() => {
    const btn = noBtnRef.current;
    if (!btn) return;
    const vw = window.innerWidth, vh = window.innerHeight;
    const bw = btn.offsetWidth, bh = btn.offsetHeight;
    btn.style.position = "fixed";
    btn.style.left = (Math.random() * (vw - bw - 40) + 20) + "px";
    btn.style.top = (Math.random() * (vh - bh - 40) + 20) + "px";

  if (!visible) return null;
  return React.createElement("div", { className: `screen ${showText ? 'screen-enter' : ''}` },
    React.createElement("h2", {
      className: "text-center text-gradient",

      className: "text-center",

    },
      React.createElement("button", { className: "btn btn-primary", onClick: onContinue }, "Да ❤️"),
      React.createElement("button", {
        ref: noBtnRef,
        className: "btn btn-secondary",
        onMouseEnter: moveNo,
        onClick: moveNo
      }, "Нет 🙈")
    )
  );
}

// Screen 3

    if (!visible) return;
    const t1 = setTimeout(() => setShowText(true), 400);
    const t2 = setTimeout(() => setShowHeart(true), 1200);
    const t3 = setTimeout(() => setShowBtns(true), 2000);
    return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
  }, [visible]);

  const moveNo = useCallback(() => {
    const btn = noBtnRef.current;
    if (!btn) return;
    btn.style.position = "fixed";
    btn.style.left = (Math.random() * (window.innerWidth - btn.offsetWidth - 40) + 20) + "px";
    btn.style.top = (Math.random() * (window.innerHeight - btn.offsetHeight - 40) + 20) + "px";

    },
      React.createElement("button", { className: "btn btn-primary", onClick: onContinue }, "Да, точно ❤️"),
      React.createElement("button", {
        ref: noBtnRef,
        className: "btn btn-secondary",
        onMouseEnter: moveNo,
        onClick: moveNo

  );
}

// Screen 4 - Heart Breaking
function Screen4({ onContinue, visible }) {
  const [phase, setPhase] = useState("text");
  const svgRef = useRef(null);
  const particlesData = useMemo(() =>
    Array.from({ length: 30 }, () => ({
      x: (Math.random() - 0.5) * 600,
      y: (Math.random() - 0.5) * 600,

    })), []
  );

  useEffect(() => {
    if (!visible) return;
    setPhase("text");
    const t1 = setTimeout(() => setPhase("heart"), 2000);
    const t2 = setTimeout(() => setPhase("breaking"), 4000);
    const t3 = setTimeout(() => { setPhase("done"); onContinue(); }, 5500);
    return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
  }, [visible]);

  useEffect(() => {
    if (phase !== "breaking") return;
    const svg = svgRef.current;
    if (!svg) return;
    gsap.to(svg.querySelectorAll("path"), {
      scale: 0, opacity: 0,
      rotation: () => gsap.utils.random(-30, 30),
      x: () => gsap.utils.random(-100, 100),
      y: () => gsap.utils.random(-100, 100),
      duration: 1.2, ease: "power3.out", stagger: 0.03,
    });
    gsap.to(svg, { scale: 0.3, opacity: 0, duration: 0.8, delay: 0.5, ease: "power2.in" });
  }, [phase]);

  if (!visible) return null;
  return React.createElement("div", { className: "screen" },
    phase === "text" && React.createElement("h2", {
      key: "t",
      className: "text-center text-gradient",
      style: { fontSize: "clamp(1.25rem,4vw,2.25rem)", fontWeight: 700, animation: "fadeInUp .8s ease both" }
    }, "Последний шанс перед правдой..."),
    (phase === "heart" || phase === "breaking") && React.createElement("div", {
      key: "h",
      style: { position: "relative", animation: "fadeInScale .6s ease .2s both" }
    },
      React.createElement("div", {
        style: {
          position: "absolute", inset: 0,
          background: "radial-gradient(circle,rgba(255,77,109,.2),transparent 70%)",
          filter: "blur(60px)", transform: "scale(1.5)"
        }
      }),
      React.createElement("svg", {
        ref: svgRef,
        viewBox: "0 0 24 24",
        style: { width: "clamp(12rem,30vw,16rem)", height: "clamp(12rem,30vw,16rem)", position: "relative", zIndex: 1 },

            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#FF4D6D" opacity=".9" style="transform-origin:12px 12px"/>

        }

      }, React.createElement("span", { style: { fontSize: "clamp(3rem,8vw,5rem)", opacity: .1 } }, "💔"))
    ),
    phase === "breaking" && React.createElement("div", {

    }, particlesData.map((p, i) =>
      React.createElement("div", {
        key: i,

          position: "absolute", width: 8, height: 8, borderRadius: "50%",
          background: `hsl(${343 + Math.sin(i) * 20},80%,${50 + Math.sin(i * 2) * 30}%)`,
          left: "50%", top: "50%",
          animation: `fadeOut ${p.dur}s ease ${p.delay}s forwards`,
          transform: `translate(${p.x}px,${p.y}px)`
        }
      })
    ))
  );
}

// Screen 5 - Heart Restoration
function Screen5({ onContinue, visible }) {
  const [phase, setPhase] = useState("silence");
  const heartRef = useRef(null);
  const glowRef = useRef(null);

  useEffect(() => {
    if (!visible) return;
    setPhase("silence");
    const t1 = setTimeout(() => setPhase("restoring"), 1200);
    const t3 = setTimeout(() => setPhase("pulsing"), 3500);
    const t4 = setTimeout(() => { setPhase("done"); onContinue(); }, 5000);
    return () => { clearTimeout(t1); clearTimeout(t3); clearTimeout(t4); };
  }, [visible]);

  useEffect(() => {
    if (phase !== "restoring") return;
    const h = heartRef.current;
    const g = glowRef.current;
    if (h) gsap.fromTo(h, { scale: 0, opacity: 0, rotation: -180 }, { scale: 1, opacity: 1, rotation: 0, duration: 1.5, ease: "elastic.out(1,0.5)" });
    if (g) gsap.fromTo(g, { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 2, duration: 1.2, ease: "power2.out" });
  }, [phase]);

  if (!visible) return null;
  return React.createElement("div", { className: "screen" },
    phase === "silence" && React.createElement("div", {
      style: { fontSize: "clamp(2rem,5vw,4rem)", fontWeight: 300, color: "rgba(255,255,255,.2)", animation: "fadeIn .5s ease both" }
    }, "..."),
    phase === "restoring" && React.createElement("div", {

    }),
    (phase === "restoring" || phase === "pulsing") && React.createElement("div", {
      style: { position: "relative", animation: "fadeIn .5s ease both" }
    },
      React.createElement("div", {
        ref: glowRef,
        style: {
          position: "absolute", inset: 0,
          background: "radial-gradient(circle,rgba(255,77,109,.4),rgba(255,117,143,.2),transparent 70%)",
          filter: "blur(60px)"

      React.createElement("div", {

}

// Flying Hearts Data
const heartsData = Array.from({ length: 15 }, () => ({
  left: Math.random() * 100,
  hue: 343 + Math.random() * 20,
  light: 60 + Math.random() * 20,
  dur: 3 + Math.random() * 3,
  delay: Math.random() * 3,
}));

// Screen 6 - Final
function Screen6({ onRestart, visible }) {
  const [showFirst, setShowFirst] = useState(false);
  const [showSecond, setShowSecond] = useState(false);
  const [showBtn, setShowBtn] = useState(false);

  useEffect(() => {
    if (!visible) return;
    setShowFirst(false); setShowSecond(false); setShowBtn(false);
    const t1 = setTimeout(() => setShowFirst(true), 800);
    const t2 = setTimeout(() => setShowSecond(true), 3000);
    const t3 = setTimeout(() => setShowBtn(true), 4500);
    return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
  }, [visible]);

  if (!visible) return null;
  return React.createElement("div", { className: "screen", style: { padding: "0 24px" } },
    React.createElement("div", { className: "flying-hearts" },
      heartsData.map((h, i) =>
        React.createElement("div", {
          key: i,
          className: "float-heart",
          style: {
            left: `${h.left}%`,
            "--dur": `${h.dur}s`,
            "--delay": `${h.delay}s`,
            "--x": `${(Math.random() - 0.5) * 200}px`,

          React.createElement(HeartSvg, { size: 16, color: `hsla(${h.hue},80%,${h.light}%,.6)` })

    showFirst && React.createElement("div", {
      style: { textAlign: "center", maxWidth: 640, marginBottom: 32, animation: "fadeInScale .8s ease both" }
    },
      React.createElement("div", {
        style: { marginBottom: 24, display: "flex", justifyContent: "center" }
      },
        React.createElement("div", { className: "heart-pulse" },
          React.createElement(HeartSvg, { size: 80, style: { filter: "drop-shadow(0 0 20px rgba(255,77,109,.5))" } })
        )
      ),
      React.createElement("p", {
        style: { fontSize: "clamp(1.25rem,3.5vw,2.25rem)", fontWeight: 700, lineHeight: 1.6 }
      },
        React.createElement("span", { className: "text-gradient" }, "Потому что среди миллиардов людей"),
        React.createElement("br"),
        React.createElement("span", { className: "text-gradient" }, "именно ты стал(а) самым важным"),
        React.createElement("br"),
        React.createElement("span", { className: "text-gradient" }, "человеком в моей жизни ", React.createElement(HeartSvg, { size: 24, className: "heart", style: { verticalAlign: "middle" } }))
      )
    ),
    showSecond && React.createElement("p", {
      style: { textAlign: "center", fontSize: "clamp(1rem,2.5vw,1.5rem)", color: "rgba(255,255,255,.6)", fontWeight: 300, fontStyle: "italic", marginBottom: 48, animation: "fadeInUp .8s ease both" }
    }, "Спасибо, что ты есть."),
    showBtn && React.createElement("button", {
      className: "btn btn-primary",
      onClick: onRestart,
      style: { animation: "fadeInUp .6s ease both", fontSize: "1.125rem", zIndex: 20 }
    }, "Создать такую же историю ", React.createElement(HeartSvg, { size: 20, className: "heart", style: { verticalAlign: "middle" } }))
  );
}

// Main App
function App() {
  const [screen, setScreen] = useState(1);

  return React.createElement("div", { className: "fullscreen" },
    React.createElement(ParticleField),
    React.createElement("div", { className: "page" },
      React.createElement("div", { className: "aurora aurora-1" }),
      React.createElement("div", { className: "aurora aurora-2" }),
      React.createElement("div", { className: "aurora aurora-3" }),
      React.createElement(Screen1, { visible: screen === 1, onContinue: () => setScreen(2) }),
      React.createElement(Screen2, { visible: screen === 2, onContinue: () => setScreen(3) }),
      React.createElement(Screen3, { visible: screen === 3, onContinue: () => setScreen(4) }),
      React.createElement(Screen4, { visible: screen === 4, onContinue: () => setScreen(5) }),
      React.createElement(Screen5, { visible: screen === 5, onContinue: () => setScreen(6) }),
      React.createElement(Screen6, { visible: screen === 6, onRestart: () => setScreen(1) })
    )
  );
}
